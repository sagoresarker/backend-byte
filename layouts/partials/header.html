<header class="site-header">
  <div class="site-container">
    <div class="site-header__inner">

      <!-- Logo -->
      <a href="{{ "/" | relURL }}" class="site-header__logo" aria-label="{{ .Site.Title }} home">
        <span class="site-header__logo-name">backend-byte</span>
        <span class="site-header__logo-dot">.</span>
      </a>

      <!-- Mobile hamburger toggle -->
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </label>

      <!-- Primary nav -->
      <nav class="site-nav" aria-label="Primary navigation">
        <ul class="site-nav__list">
          {{- range .Site.Menus.main }}
            <li>
              <a href="{{ .URL | absURL }}"
                 class="site-nav__link{{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }} active{{ end }}">
                {{ .Name }}
              </a>
            </li>
          {{- end }}
        </ul>
      </nav>

      <!-- Search -->
      {{- if .Site.Params.searchEnabled }}
        <a href="{{ "/search/" | relURL }}" class="site-header__search" aria-label="Search posts">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </a>
      {{- end }}

    </div>
  </div>
</header>
