{{ define "main" }}
<div class="band band--white">
  <div class="site-container">

    <header class="page-header">
      <h1 class="page-header__title">Search</h1>
      <p class="page-header__desc">Search across all posts on kernel, backend, networking, and systems topics.</p>
    </header>

    <div class="search-page" id="search-page">
      <div id="search-ui"></div>
    </div>

  </div>
</div>
{{ end }}

{{ define "scripts" }}
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#search-ui',
      showImages: false,
      excerptLength: 30,
      resetStyles: true,
      processTerm: function(term) { return term; }
    });

    // Auto-focus search input if query param present
    var q = new URLSearchParams(window.location.search).get('q');
    if (q) {
      var input = document.querySelector('.pagefind-ui__search-input');
      if (input) {
        input.value = q;
        input.dispatchEvent(new Event('input'));
      }
    }
  });
</script>
{{ end }}
